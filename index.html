<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Marco Antonio López Morales — Contenido · Operaciones · IA · Web3">
  <meta property="og:title" content="Marco Antonio López Morales">
  <meta property="og:description" content="Contenido · Operaciones · IA · Web3">
  <title>Marco Antonio López Morales</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold:        #c9a84c;
      --gold-light:  #e8d5a3;
      --gold-pale:   #f4ecd4;
      --gold-dim:    rgba(201,168,76,0.22);
      --gold-hover:  rgba(201,168,76,0.45);
      --stone-bg:    rgba(16,12,7,0.93);
      --text:        #f0e6d0;
      --text-muted:  #9a8870;
    }

    html, body { height: 100%; overflow-x: hidden; }

    body {
      background: #020504;
      font-family: 'Cormorant Garamond', serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.25rem;
    }

    /* ─────────────── SCENE ─────────────── */

    .scene {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .s-bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 90% 65% at 50% 12%, rgba(38,28,8,0.72) 0%, transparent 65%),
        linear-gradient(180deg, #060d05 0%, #0b1608 28%, #080f06 60%, #020504 100%);
    }

    .s-glow {
      position: absolute;
      top: -15%;
      left: 50%;
      transform: translateX(-50%);
      width: 140%;
      height: 70%;
      background: radial-gradient(ellipse at 50% 8%,
        rgba(155,115,28,0.14) 0%,
        rgba(90,65,12,0.06)  35%,
        transparent          65%
      );
      animation: breathe 9s ease-in-out infinite;
    }

    @keyframes breathe {
      0%,100% { opacity: 0.75; }
      50%      { opacity: 1;    }
    }

    .s-mountains {
      position: absolute;
      bottom: 0; left: 0;
      width: 100%; height: 55%;
    }

    .s-trees {
      position: absolute;
      bottom: 0; left: 0;
      width: 100%; height: 68%;
    }

    .s-mist {
      position: absolute;
      left: 0; right: 0;
    }
    .s-mist-1 {
      top: 38%; height: 14%;
      background: linear-gradient(180deg, transparent, rgba(210,205,188,0.032), transparent);
      filter: blur(18px);
    }
    .s-mist-2 {
      top: 56%; height: 9%;
      background: linear-gradient(180deg, transparent, rgba(210,205,188,0.022), transparent);
      filter: blur(22px);
    }

    .s-vignette {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 72% 72% at 50% 50%, transparent 38%, rgba(1,3,1,0.65) 100%);
    }

    #particles { position: absolute; inset: 0; }

    /* ─────────────── CARD ─────────────── */

    .card {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 462px;
      opacity: 0;
      transform: translateY(38px);
      animation: rise 1.7s cubic-bezier(0.22,1,0.36,1) 0.35s forwards;
    }

    @keyframes rise {
      to { opacity: 1; transform: translateY(0); }
    }

    .card-inner {
      position: relative;
      padding: 3rem 2.5rem 2.5rem;
      background: var(--stone-bg);
      border: 1px solid var(--gold-dim);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow:
        0 6px 70px rgba(0,0,0,0.88),
        0 1px 0  rgba(201,168,76,0.16) inset,
        0 -1px 0 rgba(201,168,76,0.08) inset;
    }

    /* Ornamental corners */
    .corner {
      position: absolute;
      width: 34px; height: 34px;
      pointer-events: none;
    }
    .c-tl { top: -1px;    left: -1px;  }
    .c-tr { top: -1px;    right: -1px; transform: scaleX(-1); }
    .c-bl { bottom: -1px; left: -1px;  transform: scaleY(-1); }
    .c-br { bottom: -1px; right: -1px; transform: scale(-1);  }

    /* ─────────────── AVATAR ─────────────── */

    .avatar-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 1.75rem;
      opacity: 0;
      animation: fadeslide 0.9s ease 0.9s forwards;
    }

    .avatar {
      width: 82px; height: 82px;
      border-radius: 50%;
      border: 1px solid rgba(201,168,76,0.38);
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 35% 35%, rgba(42,33,17,0.92), rgba(12,9,5,0.97));
      box-shadow: 0 0 0 5px rgba(201,168,76,0.05), 0 0 28px rgba(0,0,0,0.75);
      position: relative;
    }
    .avatar::before {
      content: '';
      position: absolute;
      inset: 5px;
      border-radius: 50%;
      border: 1px solid rgba(201,168,76,0.14);
    }
    .avatar-letter {
      font-family: 'Cinzel', serif;
      font-size: 1.9rem;
      font-weight: 600;
      color: var(--gold-light);
      text-shadow: 0 0 20px rgba(201,168,76,0.55);
      position: relative;
      z-index: 1;
      line-height: 1;
    }

    /* ─────────────── NAME ─────────────── */

    .name {
      font-family: 'Cinzel', serif;
      font-weight: 700;
      font-size: clamp(1.32rem, 4.6vw, 1.78rem);
      line-height: 1.35;
      text-align: center;
      color: var(--gold-pale);
      letter-spacing: 0.055em;
      text-shadow:
        0 0 42px rgba(201,168,76,0.38),
        0 2px 8px rgba(0,0,0,0.95);
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: fadeslide 0.9s ease 1.05s forwards;
    }

    /* ─────────────── DIVIDER ─────────────── */

    .divider {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      margin-bottom: 1.1rem;
      opacity: 0;
      animation: fadeslide 0.9s ease 1.2s forwards;
    }
    .div-line {
      flex: 1; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201,168,76,0.35), transparent);
    }

    /* ─────────────── TAGLINE ─────────────── */

    .tagline {
      font-style: italic;
      font-weight: 300;
      font-size: clamp(0.78rem, 2.6vw, 0.88rem);
      text-align: center;
      color: var(--gold-light);
      letter-spacing: 0.14em;
      margin-bottom: 2.25rem;
      opacity: 0;
      animation: fadeslide 0.9s ease 1.32s forwards;
    }

    /* ─────────────── LINKS ─────────────── */

    .links {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      list-style: none;
    }

    .link-item { opacity: 0; }
    .link-item:nth-child(1) { animation: fadeslide 0.8s ease 1.48s forwards; }
    .link-item:nth-child(2) { animation: fadeslide 0.8s ease 1.62s forwards; }
    .link-item:nth-child(3) { animation: fadeslide 0.8s ease 1.76s forwards; }
    .link-item:nth-child(4) { animation: fadeslide 0.8s ease 1.90s forwards; }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      padding: 0.88rem 1.2rem;
      background: linear-gradient(135deg, rgba(34,26,16,0.62), rgba(22,17,10,0.72));
      border: 1px solid rgba(201,168,76,0.17);
      text-decoration: none;
      color: var(--text);
      transition: all 0.38s cubic-bezier(0.22,1,0.36,1);
      position: relative;
      overflow: hidden;
    }
    .link-btn::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(201,168,76,0.07) 0%, transparent 55%);
      opacity: 0;
      transition: opacity 0.38s;
    }
    .link-btn::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201,168,76,0.28), transparent);
      opacity: 0;
      transition: opacity 0.38s;
    }
    .link-btn:hover {
      border-color: var(--gold-hover);
      transform: translateY(-2px) translateX(1px);
      box-shadow:
        0 9px 28px rgba(0,0,0,0.55),
        0 0 20px rgba(201,168,76,0.07);
    }
    .link-btn:hover::before,
    .link-btn:hover::after { opacity: 1; }
    .link-btn:active { transform: translateY(0); }

    .lnk-icon {
      width: 20px; height: 20px;
      flex-shrink: 0;
      color: var(--gold);
      opacity: 0.72;
      transition: opacity 0.3s, transform 0.3s;
    }
    .link-btn:hover .lnk-icon {
      opacity: 1;
      transform: scale(1.1);
    }

    .lnk-text { flex: 1; min-width: 0; }

    .lnk-title {
      font-family: 'Cinzel', serif;
      font-weight: 400;
      font-size: 0.74rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold-light);
      line-height: 1.3;
      transition: color 0.3s;
    }
    .link-btn:hover .lnk-title { color: var(--gold-pale); }

    .lnk-sub {
      font-size: 0.7rem;
      font-style: italic;
      font-weight: 300;
      color: var(--text-muted);
      margin-top: 2px;
      line-height: 1.2;
    }

    .lnk-arrow {
      width: 14px; height: 14px;
      color: var(--gold);
      opacity: 0;
      transform: translateX(-6px);
      transition: all 0.32s ease;
      flex-shrink: 0;
    }
    .link-btn:hover .lnk-arrow {
      opacity: 0.55;
      transform: translateX(0);
    }

    /* ─────────────── FOOTER ─────────────── */

    .footer {
      text-align: center;
      margin-top: 2rem;
      padding-top: 1.25rem;
      border-top: 1px solid rgba(201,168,76,0.1);
      opacity: 0;
      animation: fadein 1s ease 2.2s forwards;
    }
    .footer-mark {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 0.6rem;
      letter-spacing: 0.38em;
      color: rgba(201,168,76,0.24);
    }

    /* ─────────────── KEYFRAMES ─────────────── */

    @keyframes fadeslide {
      from { opacity: 0; transform: translateY(13px); }
      to   { opacity: 1; transform: translateY(0);    }
    }
    @keyframes fadein {
      to { opacity: 1; }
    }

    /* ─────────────── RESPONSIVE ─────────────── */

    @media (max-width: 500px) {
      body {
        align-items: flex-start;
        padding: 2.25rem 0.85rem 3rem;
      }
      .card-inner { padding: 2.5rem 1.5rem 2rem; }
    }
    @media (max-width: 340px) {
      .card-inner { padding: 2rem 1.1rem 1.75rem; }
      .name { font-size: 1.18rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>

<script>
(function () {
  'use strict';

  const canvas = document.getElementById('particles');
  const ctx    = canvas.getContext('2d');
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  let W, H, pts = [], raf;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function mkPt() {
    return {
      x:   Math.random() * W,
      y:   H * 0.25 + Math.random() * H * 0.75,
      r:   0.55 + Math.random() * 1.15,
      cap: 0.08 + Math.random() * 0.3,
      a:   0,
      da:  (Math.random() > 0.5 ? 1 : -1) * (0.003 + Math.random() * 0.006),
      vx:  (Math.random() - 0.5) * 0.11,
      vy:  -(0.035 + Math.random() * 0.075),
      t:   Math.random() * 100,
      ts:  0.004 + Math.random() * 0.009,
      hue: 36 + Math.random() * 20,
    };
  }

  function init() {
    pts = [];
    const n = Math.min(52, Math.round((W * H) / 17000));
    for (let i = 0; i < n; i++) {
      const p = mkPt();
      p.a = Math.random() * p.cap;
      pts.push(p);
    }
  }

  function tick() {
    ctx.clearRect(0, 0, W, H);

    for (const p of pts) {
      p.t  += p.ts;
      p.x  += p.vx + Math.sin(p.t) * 0.065;
      p.y  += p.vy + Math.cos(p.t * 0.75) * 0.048;
      p.a  += p.da;

      if (p.a >= p.cap)  { p.a = p.cap;  p.da = -Math.abs(p.da); }
      else if (p.a <= 0) {
        if (Math.random() < 0.28) {
          Object.assign(p, mkPt());
        } else {
          p.da = Math.abs(p.da);
        }
      }

      if (p.y < -15 || p.x < -15 || p.x > W + 15) Object.assign(p, mkPt());

      const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 5.5);
      g.addColorStop(0,    `hsla(${p.hue},82%,72%,${p.a})`);
      g.addColorStop(0.28, `hsla(${p.hue},72%,60%,${p.a * 0.42})`);
      g.addColorStop(1,    `hsla(${p.hue},65%,50%,0)`);

      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * 5.5, 0, Math.PI * 2);
      ctx.fillStyle = g;
      ctx.fill();

      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * 0.65, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${p.hue},92%,88%,${Math.min(p.a * 1.5, 1)})`;
      ctx.fill();
    }

    raf = requestAnimationFrame(tick);
  }

  resize();
  init();
  if (!reduceMotion) tick();

  window.addEventListener('resize', () => { resize(); init(); });
})();
</script>
